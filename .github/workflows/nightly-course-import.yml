name: Nightly Course Import

# Opt into Node 24 for JavaScript-based actions (GitHub Actions platform migration away from Node 20).
# See: https://github.com/actions/runner/pull/3948
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without writing course/tee/hole rows"
        required: false
        default: "false"
      phase:
        description: "Override phase (england_wales|scotland|ireland)"
        required: false
        default: ""
      territory:
        description: "Override territory code"
        required: false
        default: "uk"
      max_new_seeds:
        description: "Max new seeds in this run"
        required: false
        default: ""
      max_retries:
        description: "Max retries in this run"
        required: false
        default: ""
      max_refreshes:
        description: "Max refreshes in this run"
        required: false
        default: ""
      max_priority:
        description: "Max priority courses in this run"
        required: false
        default: ""
      force_catalog_full_refresh:
        description: "If true, always run post-batch stale catalog sweep (same as CLI --force-catalog-full-refresh)"
        required: false
        default: "false"
  schedule:
    - cron: "15 2 * * *"

jobs:
  import-courses:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Importer env (scripts/nightly-course-import.ts → lib/server/courseImportEngine.ts):
    # - requireEnv("NEXT_PUBLIC_SUPABASE_URL") — same project URL as lib/supabase.ts (also accepts EXPO_PUBLIC there).
    # - requireEnv("SUPABASE_SERVICE_ROLE_KEY")
    # - golfApiGet: GOLFCOURSE_API_KEY | EXPO_PUBLIC_GOLFCOURSE_API_KEY | NEXT_PUBLIC_GOLF_API_KEY
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || secrets.EXPO_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GOLFCOURSE_API_KEY: ${{ secrets.GOLFCOURSE_API_KEY || secrets.EXPO_PUBLIC_GOLFCOURSE_API_KEY || secrets.NEXT_PUBLIC_GOLF_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          # Job runtime: keep Node 20 for stability with tsx / Expo toolchain (engines allow >=18).
          # Bump to 22 LTS when you want a supported upgrade path before Node 24 for app code.
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run nightly import
        shell: bash
        run: |
          set -euo pipefail
          ARGS=""
          if [[ "${{ github.event.inputs.dry_run || '' }}" == "true" ]]; then
            ARGS="$ARGS --dry-run"
          fi
          if [[ -n "${{ github.event.inputs.phase || '' }}" ]]; then
            ARGS="$ARGS --phase=${{ github.event.inputs.phase }}"
          fi
          if [[ -n "${{ github.event.inputs.territory || '' }}" ]]; then
            ARGS="$ARGS --territory=${{ github.event.inputs.territory }}"
          fi
          if [[ -n "${{ github.event.inputs.max_new_seeds || '' }}" ]]; then
            ARGS="$ARGS --max-new-seeds=${{ github.event.inputs.max_new_seeds }}"
          fi
          if [[ -n "${{ github.event.inputs.max_retries || '' }}" ]]; then
            ARGS="$ARGS --max-retries=${{ github.event.inputs.max_retries }}"
          fi
          if [[ -n "${{ github.event.inputs.max_refreshes || '' }}" ]]; then
            ARGS="$ARGS --max-refreshes=${{ github.event.inputs.max_refreshes }}"
          fi
          if [[ -n "${{ github.event.inputs.max_priority || '' }}" ]]; then
            ARGS="$ARGS --max-priority=${{ github.event.inputs.max_priority }}"
          fi
          if [[ "${{ github.event.inputs.force_catalog_full_refresh || '' }}" == "true" ]]; then
            ARGS="$ARGS --force-catalog-full-refresh"
          fi
          npm run course-import:nightly -- $ARGS

      - name: Upload morning report artifact
        if: always() && hashFiles('reports/nightly-course-import/**') != ''
        uses: actions/upload-artifact@v5
        with:
          name: nightly-course-import-report-${{ github.run_id }}
          path: reports/nightly-course-import/*
          if-no-files-found: ignore
