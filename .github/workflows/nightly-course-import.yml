name: Nightly Course Import

on:
  workflow_dispatch:
  schedule:
    - cron: "15 2 * * *"

jobs:
  import-courses:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run nightly import
        run: npm run course-import:nightly
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOLFCOURSE_API_KEY: ${{ secrets.GOLFCOURSE_API_KEY }}
